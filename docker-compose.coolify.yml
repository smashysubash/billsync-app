services:
  backend:
    image: ghcr.io/smashysubash/billsync-backend:latest
    container_name: billsync-backend
    ports:
      - "8001:8001"
    volumes:
      - billsync_uploads:/app/uploads
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - ZOHO_CLIENT_ID=${ZOHO_CLIENT_ID}
      - ZOHO_CLIENT_SECRET=${ZOHO_CLIENT_SECRET}
      - ZOHO_REDIRECT_URI=${ZOHO_REDIRECT_URI}
      - PORT=8001
    restart: unless-stopped

  frontend:
    image: ghcr.io/smashysubash/billsync-app:latest
    container_name: billsync-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=${VITE_API_URL}
    restart: unless-stopped

volumes:
  billsync_uploads:
