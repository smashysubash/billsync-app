services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: billsync-backend-dev
    volumes:
      - ./backend:/app/backend
      - ./uploads:/app/uploads
    ports:
      - "8001:8001"
    env_file:
      - .env
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8001 --reload
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: billsync-frontend-dev
    volumes:
      - ./frontend:/app
      - /app/node_modules # Anonymous volume to prevent host node_modules from overwriting container node_modules
    ports:
      - "5174:5173"
    environment:
      - VITE_API_URL=http://localhost:8001
    depends_on:
      - backend
    restart: unless-stopped
